services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_new:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_llm
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          memory: 30gb
      # NOTA: Si tu servidor tiene GPU NVIDIA, des comenta las siguientes líneas para aceleración:
      #   reservations:
      #     devices:
      #       - driver: nvidia
      #         count: all
      #         capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_app
    restart: always
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${TZ}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/documentos
      - N8N_HOST=10.240.237.49  # <-- Pon aquí tu IP privada (ej. 192.168.1.50 o la que sea)
      - WEBHOOK_URL=http://10.240.237.49:5678/ # <-- Misma IP aquí
    volumes:
      - n8n_data_new:/home/node/.n8n
      - ./documentos:/home/node/documentos:rw
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  ollama-pull-models:
    image: curlimages/curl:latest
    container_name: ollama_pull_models
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "========================================="
        echo "Iniciando descarga de modelos en Ollama..."
        echo "========================================="
        echo "Descargando modelo de Chat/LLM: ${OLLAMA_CHAT_MODEL}..."
        curl -s -X POST http://ollama:11434/api/pull -d "{\"name\": \"${OLLAMA_CHAT_MODEL}\"}"
        echo ""
        echo "Descargando modelo de Embeddings: ${OLLAMA_EMBED_MODEL}..."
        curl -s -X POST http://ollama:11434/api/pull -d "{\"name\": \"${OLLAMA_EMBED_MODEL}\"}"
        echo ""
        echo "========================================="
        echo "¡Modelos descargados con éxito!"
        echo "========================================="

volumes:
  n8n_data_new:
  postgres_data_new:
  ollama_data:
